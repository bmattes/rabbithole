name: Bulk Puzzle Generation

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'First date to generate (YYYY-MM-DD)'
        required: true
      num_days:
        description: 'Number of consecutive days to generate'
        required: false
        default: '30'

jobs:
  # Step 1: compute the list of dates as a JSON array for the matrix
  prepare:
    runs-on: ubuntu-latest
    outputs:
      dates: ${{ steps.gen.outputs.dates }}
    steps:
      - name: Generate date list
        id: gen
        run: |
          START="${{ github.event.inputs.start_date }}"
          NUM_DAYS="${{ github.event.inputs.num_days }}"
          dates=$(python3 -c "
          from datetime import date, timedelta
          import json
          start = date.fromisoformat('$START')
          days = int('$NUM_DAYS')
          print(json.dumps([str(start + timedelta(days=i)) for i in range(days)]))
          ")
          echo "dates=$dates" >> $GITHUB_OUTPUT

  # Step 2: one job per date, all running in parallel
  generate:
    needs: prepare
    name: Generate ${{ matrix.date }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        date: ${{ fromJson(needs.prepare.outputs.dates) }}

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Get ISO week number (for cache key)
        id: week
        run: echo "week=$(date +%Y-W%V)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v4
        with:
          path: pipeline/.entity-cache
          key: entity-cache-${{ steps.week.outputs.week }}-${{ matrix.date }}
          restore-keys: entity-cache-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pipeline

      - name: Generate all domains for ${{ matrix.date }}
        working-directory: pipeline
        run: |
          DOMAINS="history movies soccer science geography literature philosophy royals military space food comics tv videogames art basketball americanfootball music mb_rock mb_hiphop mb_country"
          any_failed=0
          for domain in $DOMAINS; do
            echo "--- $domain ---"
            npx ts-node src/scripts/agent-loop.ts --domain "$domain" --date "${{ matrix.date }}" || any_failed=1
          done
          exit $any_failed

      - name: Verify coverage
        if: always()
        run: node check-today.js ${{ matrix.date }}
        working-directory: pipeline

  # Step 3: summary check across all dates
  check:
    needs: generate
    if: always()
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: pipeline

      - name: Check coverage for all dates
        working-directory: pipeline
        run: |
          START="${{ github.event.inputs.start_date }}"
          NUM_DAYS="${{ github.event.inputs.num_days }}"
          any_missing=0
          for i in $(seq 0 $((NUM_DAYS - 1))); do
            DATE=$(date -d "$START + $i days" +%Y-%m-%d)
            echo "--- $DATE ---"
            node check-today.js "$DATE" || any_missing=1
          done
          exit $any_missing
